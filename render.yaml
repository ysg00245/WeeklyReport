services:
  - type: web
    name: weekly-report
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_PW
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DB_PATH
        value: /opt/render/project/src/weekly_report.db
      - key: PYTHON_VERSION
        value: "3.11"
    disk:
      name: weekly-report-data
      mountPath: /opt/render/project/src
      sizeGB: 1
